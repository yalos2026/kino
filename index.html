<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кинокомпания Джи Пи</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 40px;
      text-align: center;
      background: black;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 42px;
      letter-spacing: 2px;
    }

    nav {
      text-align: center;
      padding: 20px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.7;
    }

    nav a:hover {
      opacity: 1;
    }

    .hero {
      height: 80vh;
      background: url('hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero h2 {
      font-size: 48px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .project {
      background: #111;
      padding: 20px;
      border: 1px solid #222;
    }

    .project img {
      width: 100%;
      height: auto;
    }

    footer {
      text-align: center;
      padding: 40px;
      background: black;
      border-top: 1px solid #222;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>КИНОКОМПАНИЯ ДЖИ ПИ</h1>
</header>

<nav>
  <a href="#about">О нас</a>
  <a href="#projects">Проекты</a>
  <a href="#contacts">Контакты</a>
</nav>

<div class="hero">
  <h2>Создаем кино, которое чувствуется</h2>
</div>

<section id="about">
  <h2>О нас</h2>
  <p>
    (ВСТАВЬ СЮДА ТВОЙ ТЕКСТ С САЙТА)
  </p>
</section>

<section id="projects">
  <h2>Проекты</h2>

  <div class="projects">

    <div class="project">
      <img src="project1.jpg" alt="">
      <h3>Название проекта</h3>
      <p>Описание проекта</p>
    </div>

    <div class="project">
      <img src="project2.jpg" alt="">
      <h3>Название проекта</h3>
      <p>Описание проекта</p>
    </div>

  </div>
</section>

<section id="contacts">
  <h2>Контакты</h2>
  <p>Email: your@email.com</p>
  <p>Instagram: @yourname</p>
</section>

<footer>
  © 2026 Кинокомпания Джи Пи
</footer>

</body>
</html>
